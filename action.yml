name: CIB agent instruction check
description: Run one evidence-backed routing check and upload its sanitized decision report.

inputs:
  config:
    description: Path to cib.yaml, relative to the calling repository.
    required: true
  openai-api-key:
    description: OpenAI API key supplied from a masked GitHub secret for CI-only Codex login.
    required: true
  artifact-name:
    description: Name of the uploaded safe report artifact.
    required: false
    default: cib-agent-proof
  retention-days:
    description: Number of days to retain the safe report artifact.
    required: false
    default: "14"

outputs:
  verdict:
    description: pass, fail, or invalid.
    value: ${{ steps.check.outputs.verdict }}
  exit-code:
    description: "CIB exit code: 0 pass, 1 threshold failure, or 2 invalid evidence."
    value: ${{ steps.check.outputs.exit-code }}
  report-path:
    description: Absolute path to the sanitized HTML report in the current job.
    value: ${{ steps.check.outputs.report-path }}
  report-artifact:
    description: Name of the uploaded safe report artifact.
    value: ${{ inputs.artifact-name }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "22.22.0"

    - name: Install locked CIB runtime
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        python -m pip install --disable-pip-version-check uv==0.9.25
        uv sync --frozen --no-dev
        npm install --global npm@11.11.1
        tool_root="${RUNNER_TEMP}/cib-tooling"
        npm install --global --prefix "${tool_root}" @openai/codex@0.144.5
        codex_bin="${tool_root}/bin/codex"
        test "$("${codex_bin}" --version)" = "codex-cli 0.144.5"
        npm ci
        echo "${GITHUB_ACTION_PATH}/.venv/bin" >> "${GITHUB_PATH}"
        echo "${GITHUB_ACTION_PATH}/node_modules/.bin" >> "${GITHUB_PATH}"
        echo "${tool_root}/bin" >> "${GITHUB_PATH}"
        echo "CIB_PYTHON=${GITHUB_ACTION_PATH}/.venv/bin/python" >> "${GITHUB_ENV}"
        echo "CIB_CODEX_BIN=${codex_bin}" >> "${GITHUB_ENV}"

    - name: Prepare isolated Codex authentication
      id: auth
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: |
        set -euo pipefail
        auth_dir="${RUNNER_TEMP}/cib-codex-auth"
        auth_path="${auth_dir}/auth.json"
        mkdir -p "${auth_dir}"
        printenv OPENAI_API_KEY | CODEX_HOME="${auth_dir}" \
          "${CIB_CODEX_BIN}" login --with-api-key >/dev/null
        test -f "${auth_path}"
        chmod 0600 "${auth_path}"
        echo "path=${auth_path}" >> "${GITHUB_OUTPUT}"

    - name: Run CIB check
      id: check
      if: always()
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CIB_CONFIG_INPUT: ${{ inputs.config }}
      run: |
        set -euo pipefail
        case "${CIB_CONFIG_INPUT}" in
          /*) config_path="${CIB_CONFIG_INPUT}" ;;
          *) config_path="${GITHUB_WORKSPACE}/${CIB_CONFIG_INPUT}" ;;
        esac
        output_dir="${RUNNER_TEMP}/cib-check-output"
        set +e
        cib check "${config_path}" \
          --output-dir "${output_dir}" \
          --auth "${{ steps.auth.outputs.path }}"
        set -e
        python - "${output_dir}/check-result.json" "${GITHUB_OUTPUT}" <<'PY'
        import json
        import pathlib
        import sys

        result_path = pathlib.Path(sys.argv[1])
        output_path = pathlib.Path(sys.argv[2])
        status = 2
        verdict = "invalid"
        report_path = ""
        try:
            result = json.loads(result_path.read_text(encoding="utf-8"))
            candidate_verdict = result["verdict"]
            candidate_status = result["exit_code"]
            expected_status = {"pass": 0, "fail": 1, "invalid": 2}
            if (
                result["schema_version"] == "cib-check-result/1"
                and type(candidate_status) is int
                and expected_status.get(candidate_verdict) == candidate_status
            ):
                verdict = candidate_verdict
                status = candidate_status
                report_path = str(result_path.parent / result["report_html"])
        except (OSError, KeyError, TypeError, ValueError, json.JSONDecodeError):
            pass
        with output_path.open("a", encoding="utf-8") as output:
            output.write(f"verdict={verdict}\n")
            output.write(f"exit-code={status}\n")
            output.write(f"report-path={report_path}\n")
        PY

    - name: Upload safe CIB report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ runner.temp }}/cib-check-output/check-result.json
          ${{ runner.temp }}/cib-check-output/report
        if-no-files-found: warn
        retention-days: ${{ inputs.retention-days }}

    - name: Enforce CIB verdict
      if: always()
      shell: bash
      env:
        CIB_EXIT_CODE: ${{ steps.check.outputs.exit-code }}
      run: |
        case "${CIB_EXIT_CODE:-2}" in
          0|1|2) exit "${CIB_EXIT_CODE:-2}" ;;
          *) exit 2 ;;
        esac
