name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.0"
          cache: npm

      - name: Use the locked npm version
        run: npm install --global npm@11.11.1

      - name: Install locked dependencies
        run: |
          python -m pip install --disable-pip-version-check uv==0.9.25
          uv sync --frozen --group dev --python "${{ matrix.python-version }}"
          npm ci

      - name: Run deterministic proof
        run: |
          uv run --python "${{ matrix.python-version }}" python -m pytest -q
          uv run --python "${{ matrix.python-version }}" python scripts/publication_check.py
          npm run verify

      - name: Build distributions
        if: matrix.python-version == '3.14'
        run: uv build
