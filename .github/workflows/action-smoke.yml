name: Action smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  action-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up the Action Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.0"

      - name: Install fake npm boundary
        run: |
          npm_path="$(command -v npm)"
          test_npm_root="${RUNNER_TEMP}/cib-test-npm"
          "${npm_path}" install --global --prefix "${test_npm_root}" \
            npm@11.11.1
          mv "${npm_path}" "${npm_path}.cib-original"
          install -m 0755 tests/fixtures/action/fake-npm \
            "${npm_path}"
          echo "CIB_REAL_NPM=${test_npm_root}/bin/npm" >> "${GITHUB_ENV}"

      - name: Run local CIB action
        id: cib
        uses: ./
        with:
          config: tests/fixtures/action/cib.yaml
          openai-api-key: "fixture-api-key"
          artifact-name: cib-action-smoke-report
          retention-days: "1"

      - name: Assert public action verdict
        if: steps.cib.outputs.verdict == 'pass'
        env:
          CIB_VERDICT: ${{ steps.cib.outputs.verdict }}
          CIB_EXIT_CODE: ${{ steps.cib.outputs.exit-code }}
          CIB_REPORT_PATH: ${{ steps.cib.outputs.report-path }}
        run: |
          test "${CIB_VERDICT}" = "pass"
          test "${CIB_EXIT_CODE}" = "0"
          test -f "${CIB_ACTION_OUTPUT_ROOT}/${CIB_REPORT_PATH}"
          echo "${CIB_ACTION_OUTPUT_ROOT}" > "${RUNNER_TEMP}/cib-first-output-root"

      - name: Run local CIB action again
        id: cib_second
        uses: ./
        with:
          config: tests/fixtures/action/cib.yaml
          openai-api-key: "fixture-api-key"
          artifact-name: cib-action-smoke-report-second
          retention-days: "1"

      - name: Assert repeated invocation is isolated
        if: steps.cib_second.outputs.verdict == 'pass'
        env:
          CIB_VERDICT: ${{ steps.cib_second.outputs.verdict }}
          CIB_EXIT_CODE: ${{ steps.cib_second.outputs.exit-code }}
          CIB_REPORT_PATH: ${{ steps.cib_second.outputs.report-path }}
        run: |
          test "${CIB_VERDICT}" = "pass"
          test "${CIB_EXIT_CODE}" = "0"
          test -f "${CIB_ACTION_OUTPUT_ROOT}/${CIB_REPORT_PATH}"
          test "$(cat "${RUNNER_TEMP}/cib-first-output-root")" != \
            "${CIB_ACTION_OUTPUT_ROOT}"
