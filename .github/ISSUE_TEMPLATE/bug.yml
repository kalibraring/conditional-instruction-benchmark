name: Bug report
description: Report a reproducible product or harness defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never attach auth files, private manifests, or raw result directories.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest safe command and sanitized output.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Environment
      description: Paste reviewed `cib doctor` output and relevant versions.
    validations:
      required: true
  - type: dropdown
    id: class
    attributes:
      label: Suspected class
      options:
        - Product or CLI
        - Fixture or isolation harness
        - Execution adapter or provider
        - Scoring or evidence normalization
        - Analysis or reporting
        - Unsure
    validations:
      required: true
